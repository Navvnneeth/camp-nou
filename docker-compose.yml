services:
  postgres:
    image: postgres:16-alpine
    container_name: campnou-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: campnou
      POSTGRES_PASSWORD: campnou123
      POSTGRES_DB: campnou_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
